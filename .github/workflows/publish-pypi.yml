name: GitHub Release and Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build on Ubuntu 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install UV
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Build wheels
        run: uv build --package laser.measles --out-dir dist --sdist --wheel --python 3.12

      - name: Store distribution packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/

  github-release:
    name: >-
      Sign Python 🐍 distribution 📦 with Sigstore and make GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: "${{ github.ref_name }}"
          fetch-depth: 1
          fetch-tags: true

      - name: Download dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-package-distributions*
          merge-multiple: true
          path: dist/

      - name: Sign with Sigstore
        uses: sigstore/gh-action-sigstore-python@04cffa1d795717b140764e8b640de88853c92acc # v3.3.0
        with:
          inputs: >-
            ./dist/*.tar.gz
            ./dist/*.whl

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git status
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release upload --clobber "${{ github.ref_name }}" dist/* \
              --notes "Updated release for ${{ github.ref_name }}"
          else
            gh release create "${{ github.ref_name }}" dist/* \
              --title "${{ github.ref_name }}" \
              --notes "Automated release for ${{ github.ref_name }}"
          fi

  publish-to-pypi:
    name: >-
      Publish Python 🐍 distribution 📦 to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: restricted # remove if v* tag protection is enabled with GitHub App as sole bypass
      url: https://pypi.org/p/laser-measles
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
      - name: Download dists
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: python-package-distributions*
          merge-multiple: true
          path: dist/
          verbose: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  docs-jenner:
    name: Build and upload Jenner RAG artifact
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ".[docs,examples]" bump-my-version
      - name: Build combined markdown
        run: make docs-jenner
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          tag_name=v$(bump-my-version show current_version)
          gh release upload --clobber "$tag_name" dist/combined_mkdocs.md

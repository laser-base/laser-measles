name: Build Jenner Doc

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install ".[docs,examples]"
      - name: Convert tutorial notebooks
        run: python docs/tutorials/convert_tutorials.py
      - name: Execute tutorial notebooks
        run: |
          mkdir -p dist/executed_nbs
          python -m jupyter nbconvert \
            --to notebook \
            --execute \
            --allow-errors \
            --ExecutePreprocessor.timeout=300 \
            --output-dir dist/executed_nbs \
            docs/tutorials/tut_*.ipynb
      - name: Build MkDocs site
        run: mkdocs build
      - name: Generate combined_mkdocs.md
        run: python docs/concat_mkdocs.py site dist/executed_nbs dist/combined_mkdocs.md
      - name: Upload combined_mkdocs.md
        uses: actions/upload-artifact@v4
        with:
          name: combined_mkdocs
          path: dist/combined_mkdocs.md
          retention-days: 90

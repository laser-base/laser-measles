# Targeted UA probe: reproduce the failing call exactly (python-urllib) AND
# the working call (curl with vanilla UA) from the same runner. If python
# trips a 403 where curl doesn't, the failing builds are losing to a
# Cloudflare bot-fight rule that gates on User-Agent — fix is to spoof a
# browser-like UA in the tutorial's urlretrieve.
name: Debug artifactory access from a GHA runner

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        i: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Probe with vanilla Python urllib + curl, side by side
        run: |
          URL=https://packages.idmod.org/artifactory/idm-data/LASER/laser_measles_calib_tutorial.tgz
          EGRESS=$(curl -sS https://ifconfig.me || echo unknown)
          REGION=$(curl -sS -H "Metadata: true" -m 2 \
            'http://169.254.169.254/metadata/instance/compute/location?api-version=2021-02-01&format=text' \
            2>/dev/null || echo "n/a")

          echo "PROBE_INFO matrix=${{ matrix.i }} egress=$EGRESS region=$REGION"

          # (a) Vanilla curl — what we already know works
          CURL_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -m 10 -I "$URL" || echo "ERR")
          echo "PROBE_CURL  matrix=${{ matrix.i }} ua='curl-default'    status=$CURL_STATUS"

          # (b) curl with Python-urllib UA — does pretending to be urllib trip the WAF?
          UA_LIKE_URLLIB="Python-urllib/3.14"
          URLLIB_LIKE_CURL=$(curl -sS -o /dev/null -w "%{http_code}" -m 10 -A "$UA_LIKE_URLLIB" -I "$URL" || echo "ERR")
          echo "PROBE_CURLAS matrix=${{ matrix.i }} ua='$UA_LIKE_URLLIB' status=$URLLIB_LIKE_CURL"

          # (c) The exact call the failing tutorial makes — urlretrieve, real Python
          PY_STATUS=$(python3 -c "
          import sys, urllib.request, urllib.error
          try:
              resp = urllib.request.urlopen('$URL', timeout=10)
              print(resp.getcode())
          except urllib.error.HTTPError as e:
              print(e.code)
          except Exception as e:
              print(type(e).__name__, str(e)[:80])
          " 2>&1 | tail -1)
          echo "PROBE_PY    matrix=${{ matrix.i }} ua='Python-urllib/real' status=$PY_STATUS"

# .github/workflows/debug-shell.yml
name: Debug shell on runner

on:
  workflow_dispatch:

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (same one mkdocs-pr uses)
        uses: actions/setup-python@v5
        with: { python-version: "3.x" }
      - name: Open SSH session via tmate
        uses: mxschmitt/action-tmate@v3
        with:
          # `limit-access-to-actor` removed — would gate SSH on GitHub-registered
          # SSH keys, which the dispatcher doesn't have. Anyone with the
          # web URL printed in the log can connect, so disconnect when done.
          # Auto-terminate after this many minutes — bound the billing cost
          # even if you forget to disconnect from the browser session.
          timeout-minutes: 30

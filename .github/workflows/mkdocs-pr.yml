name: MkDocs Build on PR

on:
  pull_request:
    branches: [master, main] # Replace with your desired branches

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Redirect GADM downloads (used by tutorial-execution step) to the IDM
      # Artifactory mirror so PR builds don't break when geodata.ucdavis.edu
      # is unreachable.
      LASER_GADM_MIRROR: https://packages.idmod.org/artifactory/idm-data

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs and dependencies
        run: pip install ".[docs,examples]"

      - name: Convert tutorial .py files to notebooks
        run: python scripts/convert_tutorials.py

      - name: Build MkDocs site
        run: mkdocs build --config-file mkdocs.ci.yml

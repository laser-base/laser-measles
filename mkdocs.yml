site_name: laser-measles
site_url: https://laser.idmod.org/laser-measles
repo_name: laser-base/laser-measles
repo_url: https://github.com/laser-base/laser-measles
theme:
  name: material
  custom_dir: docs/customization/overrides
  font:
    text: Roboto
    code: Roboto Mono
  logo: images/idm-logo-transparent.png
  favicon: images/favicon.ico
  features:
    - navigation.footer # include a footer with links to privacy, terms, etc.
    - content.code.copy # enable copy buttons for code blocks
    - navigation.indexes # enable parent index page for sections
  palette:
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: white
      accent: light blue
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: black
      accent: light blue

nav:
  - Welcome to laser-measles: index.md
  - What's new: whatsnew.md
  - Installation: install.md
  - Tutorials:
    - tutorials/index.md
    - "Quick start: Hello world": tutorials/tut_quickstart_hello_world.ipynb
    - Beginning tutorials:
      - Create and run models: tutorials/tut_basic_model.ipynb
      - Model structure: tutorials/tut_model_structure.ipynb
      - ABM model introduction: tutorials/tut_abm_intro.ipynb
      - Create model scenarios: tutorials/tut_scenarios.ipynb
    - Feature tutorials:
      - Random numbers and reproducibility: tutorials/tut_random_numbers.ipynb
      - Create custom components: tutorials/tut_creating_component.ipynb
      - Vital dynamics: tutorials/tut_abm_vital_dynamics.ipynb
      - Spatial mixing models: tutorials/tut_spatial_mixing.ipynb
      - Parameter validation: tutorials/tut_pydantic_component_parameters.ipynb
      - State arrays: tutorials/tut_state_arrays.ipynb
    - End-to-end tutorials:
      - Vaccination modeling approaches: tutorials/tut_vaccination.ipynb
    - Calibration:
      - Spatial multi-modal calibration: tutorials/tut_calibration_spatial.ipynb
      - Chain mixing visualizer (optional): tutorials/tut_chain_mixing.ipynb
  - User guide:
    - user-guide/index.md
    - Model types:
      - user-guide/model-types/index.md
      - How to choose a model type: user-guide/model-types/choosing-a-model.md
      - Spatial mixing: user-guide/model-types/spatial-mixing.md
      - How to configure spatial mixing: user-guide/model-types/configuring-spatial-mixing.md
      - Demographics: user-guide/model-types/demographics.md
    - Components:
      - user-guide/components/index.md
      - How to create a custom component: user-guide/components/custom-component.md
      - Worked examples: user-guide/components/worked-examples.md
    - Snapshots:
      - user-guide/snapshotting/index.md
      - How to snapshot a compartmental model: user-guide/snapshotting/how-to-snapshot-compartmental.md
      - How to snapshot an ABM: user-guide/snapshotting/how-to-snapshot-abm.md
    - Standard results output: user-guide/results.md
    - Troubleshooting: user-guide/troubleshooting.md
  - API reference: reference/
  - Contributing: contributing.md
  - Code of conduct: code-of-conduct.md
  - Authors: authors.md

# icons, semantic markup, emojis
markdown_extensions:
  - toc:
      toc_depth: 3
  - attr_list # enables HTMl and CSS classes to inline elements
  - md_in_html # enables grids
  - admonition # warnings, etc.
  - def_list
  - tables # render Markdown pipe tables
  - pymdownx.emoji: # emojis and icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex: # Latex processing for math equations
      generic: true
  - pymdownx.snippets: # insert content from other files
  - abbr # term/abbreviation hover descriptions
  - pymdownx.blocks.details: # allows nesting of collapsible code
  - pymdownx.highlight: # syntax highlighting for code blocks
      linenums: true
      default_lang: 'python'
  - pymdownx.inlinehilite # syntax highlighting for inline code
  - pymdownx.superfences # enables code, diagram fences to be nested in lists, etc.e
  - pymdownx.details # collapsible elements
  - pymdownx.tabbed: # tabbed content that can be toggled
      alternate_style: true
  - pymdownx.blocks.caption # captions for images, tables, etc.

# javascript and CSS customization
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - customization/css/extra.css # custom CSS for footer spacing

plugins:
  - search # search functionality
  - autorefs # automatically create linkable references
  - include-markdown # include other files, such as READMEs
  - table-reader # enables rendering of CSV/TSV files as tables
  - mkdocs-jupyter: # enables Jupyter notebooks to be rendered
      # `execute` and `allow_errors` are env-toggled so we can keep ONE
      # authoritative mkdocs.yml with the full plugin list in both local
      # and CI builds, and only change notebook execution between them.
      #
      # The previous pattern (a separate mkdocs.ci.yml inheriting from
      # mkdocs.yml and overriding the entire `plugins:` list) was a silent
      # content regression: MkDocs's INHERIT deep-merges dict-typed keys
      # but REPLACES list-typed ones, so the CI build dropped mkdocstrings,
      # gen-files, literate-nav, autorefs, include-markdown, table-reader,
      # and exclude — producing a site with zero API reference pages and
      # broken cross-links, with exit code 0.
      #
      # Local (fast):                 mkdocs build
      # CI (notebooks executed):      MKDOCS_JUPYTER_EXECUTE=true \
      #                               MKDOCS_JUPYTER_ALLOW_ERRORS=false \
      #                               mkdocs build --strict
      execute: !ENV [MKDOCS_JUPYTER_EXECUTE, false]
      allow_errors: !ENV [MKDOCS_JUPYTER_ALLOW_ERRORS, true]
      include_source: true
      ignore: ["*.md"] # skip .md scanning to avoid jupytext→pandoc warnings on mkdocstrings autoref pages
  - gen-files:
      scripts:
        - docs/customization/gen-files.py
  - literate-nav:
      tab_length: 2
  - mkdocstrings: # process docstrings to generate API reference
      handlers:
        python:
          paths: [src] # path to source code
          options:
            docstring_style: google
            show_source: false
            merge_init_into_class: true
            heading_level: 2
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_toc_entry: true
            show_object_full_path: false
            show_root_full_path: false
            docstring_options:
              trim_doctest_flags: true
  - exclude:
      glob:
        - customization/gen-files.py # exclude file generation script
        - includes/glossary.md # exclude glossary include file

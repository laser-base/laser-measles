site_name: laser-measles
site_url: https://InstituteforDiseaseModeling.github.io/laser-measles
repo_name: InstituteforDiseaseModeling/laser-measles
repo_url: https://github.com/InstituteforDiseaseModeling/laser-measles
theme:
  name: material
  custom_dir: docs/customization/overrides
  font:
    text: Roboto
    code: Roboto Mono
  logo: images/idm-logo-transparent.png
  favicon: images/favicon.ico
  features:
    - navigation.footer # include a footer with links to privacy, terms, etc.
    - content.code.copy # enable copy buttons for code blocks
    - navigation.indexes # enable parent index page for sections
  palette:
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: white
      accent: light blue
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: black
      accent: light blue

nav:
  - Home: index.md
  - Installation: install.md
  - Usage: usage.md
  - Tutorials:
    - tutorials/index.md
    - Quick Start: tutorials/tut_quickstart_hello_world.ipynb
    - Beginning tutorials:
      - Basic Model: tutorials/tut_basic_model.ipynb
      - Model Structure: tutorials/tut_model_structure.ipynb
      - ABM Introduction: tutorials/tut_abm_intro.ipynb
      - Scenarios: tutorials/tut_scenarios.ipynb
    - Feature tutorials:
      - Random Numbers: tutorials/tut_random_numbers.ipynb
      - Creating a Component: tutorials/tut_creating_component.ipynb
      - ABM Vital Dynamics: tutorials/tut_abm_vital_dynamics.ipynb
      - Spatial Mixing: tutorials/tut_spatial_mixing.ipynb
      - Pydantic Component Parameters: tutorials/tut_pydantic_component_parameters.ipynb
      - State Arrays: tutorials/tut_state_arrays.ipynb
    - End-to-end tutorials:
      - Vaccination: tutorials/tut_vaccination.ipynb
  - API reference: reference/
  - Authors: authors.md

# icons, semantic markup, emojis
markdown_extensions:
  - toc:
      toc_depth: 3
  - attr_list # enables HTMl and CSS classes to inline elements
  - md_in_html # enables grids
  - admonition # warnings, etc.
  - def_list
  - pymdownx.emoji: # emojis and icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex: # Latex processing for math equations
      generic: true
  - pymdownx.snippets: # insert content from other files
      auto_append:
        - docs/includes/glossary.md # definitions for glossary entries
  - abbr # term/abbreviation hover descriptions
  - pymdownx.blocks.details: # allows nesting of collapsible code
  - pymdownx.highlight: # syntax highlighting for code blocks
      linenums: true
      default_lang: 'python'
  - pymdownx.inlinehilite # syntax highlighting for inline code
  - pymdownx.superfences # enables code, diagram fences to be nested in lists, etc.e
  - pymdownx.details # collapsible elements
  - pymdownx.tabbed: # tabbed content that can be toggled
      alternate_style: true
  - pymdownx.blocks.caption # captions for images, tables, etc.

# javascript and CSS customization
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
  - customization/css/extra.css # custom CSS for footer spacing

plugins:
  - search # search functionality
  - autorefs # automatically create linkable references
  - include-markdown # include other files, such as READMEs
  - table-reader # enables rendering of CSV/TSV files as tables
  - mkdocs-jupyter: # enables Jupyter notebooks to be rendered
      execute: false
      allow_errors: true # set to true to continue executing cells even if one fails
      include_source: true
  - gen-files:
      scripts:
        - docs/customization/gen-files.py
  - literate-nav:
      tab_length: 2
  - mkdocstrings: # process docstrings to generate API reference
      handlers:
        python:
          paths: [src] # path to source code
          options:
            docstring_style: google
            show_source: false
            merge_init_into_class: true
            heading_level: 2
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_toc_entry: true
            show_object_full_path: true
  - exclude:
      glob:
        - customization/gen-files.py # exclude file generation script
        - includes/glossary.md # exclude glossary include file
copyright: Copyright &copy; 2025 Gates Foundation. All rights reserved.

extra:
  generator: false
  footer_links:

site_name: laser-measles
site_url: https://InstituteforDiseaseModeling.github.io/laser-measles
repo_name: InstituteforDiseaseModeling/laser-measles
repo_url: https://github.com/InstituteforDiseaseModeling/laser-measles
theme:
  name: material
  custom_dir: docs/customization/overrides
  font: 
    text: Roboto
    code: Roboto Mono
  logo: images/idm-logo-transparent.png
  favicon: images/favicon.ico
  features:
    - navigation.footer # include a footer with links to privacy, terms, etc.
    - content.code.copy # enable copy buttons for code blocks
    - navigation.indexes # enable parent index page for sections
  palette:
    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: white
      accent: light blue
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: black
      accent: light blue

nav: # Navigation structure for the documentation
  - MkDocs introduction: mkdocs.md # intro topic for MkDocs
  - Topic types: # this creates a section in the TOC, without a parent topic
    - Tutorial topic: topic-types/tutorial.md
    - topic-types/howto.md # if there is no index parent topic, you must declare the title explicitly
    - topic-types/reference.md
    - topic-types/explanation.md
  - Home: index.md # the rest of the nav illustrates a typical doc structure
  - What's new: whatsnew.md 
  - install.md # including the topic title is optional
  - Tutorials: # this creates a section in the TOC
    - tutorials/index.md # parent topics for sections must be an index.md file
    - Get started: tutorials/intro.ipynb # the topic following index.md sometimes requires an explicit title

# icons, semantic markup, emojis 
markdown_extensions:
  - toc:
      toc_depth: 3
  - attr_list # enables HTMl and CSS classes to inline elements
  - md_in_html # enables grids
  - admonition # warnings, etc.
  - def_list
  - pymdownx.emoji: # emojis and icons
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.arithmatex: # Latex processing for math equations
      generic: true
  - pymdownx.snippets: # insert content from other files
      auto_append:
        - docs/includes/glossary.md # definitions for glossary entries
  - abbr # term/abbreviation hover descriptions
  - pymdownx.blocks.details: # allows nesting of collapsible code
  - pymdownx.highlight: # syntax highlighting for code blocks
      linenums: true
      default_lang: 'python'
  - pymdownx.inlinehilite # syntax highlighting for inline code
  - pymdownx.superfences # enables code, diagram fences to be nested in lists, etc.e
  - pymdownx.details # collapsible elements
  - pymdownx.tabbed: # tabbed content that can be toggled
      alternate_style: true
  - pymdownx.blocks.caption # captions for images, tables, etc.

# javascript and CSS customization
extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css: 
  - customization/css/extra.css # custom CSS for footer spacing

plugins:
  - search # search functionality
  - autorefs # automatically create linkable references
  - include-markdown # include other files, such as READMEs
  - table-reader # enables rendering of CSV/TSV files as tables
  - mkdocs-jupyter: # enables Jupyter notebooks to be rendered
      execute: false
      allow_errors: false # set to true to continue executing cells even if one fails
      include_source: true
  - api-autonav:
      modules: ['src/laser_measles'] # provide path to package
      module_options: {}
      nav_section_title: "API reference"
      api_root_uri: "reference"
      nav_item_prefix: "<code class='doc-symbol doc-symbol-nav doc-symbol-module'></code>"
      exclude_private: true
      show_full_namespace: false
      on_implicit_namespace_package: "warn"
  - mkdocstrings: # process docstrings to generate API reference
      handlers:
        python:
          paths: [src] # path to source code
          options:
            docstring_style: google
            show_source: false
            merge_init_into_class: true
            heading_level: 2
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_root_toc_entry: true
            show_object_full_path: true

copyright: Copyright &copy; 2025 Gates Foundation. All rights reserved.

extra:
  generator: false
  footer_links:
    - text: "Privacy and Cookies Notice"
      href: "https://www.gatesfoundation.org/Privacy-and-Cookies-Notice"
    - text: "Terms of Use"
      href: "https://www.gatesfoundation.org/Terms-of-Use"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/InstituteforDiseaseModeling/laser-measles
    - icon: fontawesome/regular/envelope
      link: mailto:idm@gatesfoundation.org
    - icon: octicons/globe-24
      link: https://idmod.org
    - icon: simple/youtube
      link: http://www.youtube.com/@institutefordiseasemodelin1987
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/company/institute-disease-modeling

  analytics:
